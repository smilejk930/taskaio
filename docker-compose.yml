services:
  taskaio:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskaio:latest
    container_name: taskaio-app
    ports:
      - "${PORT:-3001}:3000"
    volumes:
      - /data/taskaio/data:/app/data
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy # DB 준비 완료 후 앱 시작
    networks:
      - taskaio-network

  taskaio-db:
    image: postgres:15-alpine
    container_name: taskaio-db
    environment:
      POSTGRES_USER: usr_taskaio # 자동생성
      POSTGRES_PASSWORD: aio0930@% # 자동생성
      POSTGRES_DB: db_taskaio # 자동생성
    volumes:
      - /data/taskaio/db/postgresql/data:/var/lib/postgresql/data:Z
      - /data/taskaio/db/postgresql/ts_taskaio:/mnt/ts_taskaio:Z
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U usr_taskaio -d db_taskaio" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - taskaio-network

networks:
  taskaio-network:
    driver: bridge
